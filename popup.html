<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refresher Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Refresher <span>Pro</span></h1>
      <p>Set random intervals for auto-refresh.</p>
    </header>

    <main>
      <div class="controls-wrapper" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 8px;">
        <div class="section-title" style="font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.05em;">Refresh Interval (secs)</div>
        <section class="controls" style="margin-top: -6px;">
          <div class="input-group">
            <input type="number" id="minTime" min="1" placeholder="Min (30)">
          </div>
          <div class="input-group">
            <input type="number" id="maxTime" min="1" placeholder="Max (60)">
          </div>
        </section>

        <div class="section-title" style="font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.05em;">Scroll Interval (secs)</div>
        <section class="controls" style="margin-top: -6px;">
          <div class="input-group">
            <input type="number" id="scrollMinTime" min="1" placeholder="Min (10)">
          </div>
          <div class="input-group">
            <input type="number" id="scrollMaxTime" min="1" placeholder="Max (30)">
          </div>
        </section>

        <div class="section-title" style="font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.05em;">Fiverr Tab Switch (Refreshes)</div>
        <section class="controls" style="margin-top: -6px;">
          <div class="input-group">
            <input type="number" id="tabMinTime" min="1" placeholder="Min (2)">
          </div>
          <div class="input-group">
            <input type="number" id="tabMaxTime" min="1" placeholder="Max (5)">
          </div>
        </section>
      </div>

      <div class="status-container">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">System Idle</span>
      </div>

      <div id="countdownContainer" class="countdown-display" style="display: none;">
        <span class="countdown-label">Next Refresh In:</span>
        <span id="countdownValue">--</span>s
      </div>

      <button id="toggleBtn" class="premium-button">Start Refresher</button>
    </main>

    <footer>
      <p>© 2026 Random Refresher v1.0</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
